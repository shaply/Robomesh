services:
  backend:
    build: ./roboserver
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
      - "${TCP_PORT:-5002}:${TCP_PORT:-5002}"
      - "${UDP_PORT:-5001}:${UDP_PORT:-5001}/udp"
      - "${MQTT_PORT:-1883}:${MQTT_PORT:-1883}"
    env_file:
      - path: defaults.env
        required: true
      - path: .env
        required: false
    environment:
      - DEBUG=${DEBUG:-false}
      - HTTP_PORT=${HTTP_PORT:-8080}
      - TCP_PORT=${TCP_PORT:-5002}
      - UDP_PORT=${UDP_PORT:-5001}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - TERMINAL_PORT=${TERMINAL_PORT:-6000}
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-robomesh}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-robomesh_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - HANDLERS_BASE_PATH=/app/handlers
    volumes:
      - ./handlers:/app/handlers:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - robomesh
    restart: unless-stopped

  frontend:
    build: ./frontend_app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - PUBLIC_BACKEND_IP=backend
      - PUBLIC_BACKEND_PORT=${HTTP_PORT:-8080}
    depends_on:
      - backend
    networks:
      - robomesh
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - robomesh
    restart: unless-stopped

volumes:
  redis_data:

networks:
  robomesh:
    driver: bridge
